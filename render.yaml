services:
  # Backend FastAPI service
  - type: web
    name: voice-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHISPER_MODEL
        value: whisper-1
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: 21m00Tcm4TlvDq8ikWAM
      - key: ELEVENLABS_MODEL
        value: eleven_turbo_v2_5
      - key: HEYGEN_API_KEY
        sync: false
      - key: HEYGEN_AVATAR_ID
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/voice_assistant.db
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false

  # Frontend Next.js service
  - type: web
    name: voice-ai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
